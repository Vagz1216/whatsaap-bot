services:
  stayez-bot:
    build: .
    environment:
      # Database Connection (Neon or local Postgres)
      DATABASE_URL: ${DATABASE_URL}
      # API Keys will now also be sourced per-tenant or globally
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID}
      AZURE_OPENAI_API_KEY: ${AZURE_OPENAI_API_KEY}
      AZURE_OPENAI_ENDPOINT: ${AZURE_OPENAI_ENDPOINT}
      AZURE_OPENAI_DEPLOYMENT_NAME: ${AZURE_OPENAI_DEPLOYMENT_NAME}
      GROQ_API_KEY: ${GROQ_API_KEY}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY}
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY}
      LANGFUSE_BASEURL: ${LANGFUSE_BASEURL}
      META_ACCESS_TOKEN: ${META_ACCESS_TOKEN}
      META_WEBHOOK_VERIFY_TOKEN: ${META_WEBHOOK_VERIFY_TOKEN}
      ENABLE_WEBHOOK_SERVER: ${ENABLE_WEBHOOK_SERVER:-true}
      WEBHOOK_PORT: ${WEBHOOK_PORT:-3100}
      DATA_DIR: /app/data
      TZ: ${TZ:-Africa/Nairobi}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    ports:
      - "${WEBHOOK_PORT:-3100}:3100"
    volumes:
      - stayez_data:/app/data
    restart: unless-stopped

volumes:
  stayez_data:

