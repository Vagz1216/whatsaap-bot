services:
  stayez-bot:
    build: .
    environment:
      # Database Connection (Neon or local Postgres)
      DATABASE_URL: ${DATABASE_URL}
      # Dashboard auth
      DASHBOARD_REQUIRE_AUTH: ${DASHBOARD_REQUIRE_AUTH:-true}
      DASHBOARD_TOKEN: ${DASHBOARD_TOKEN}
      DASHBOARD_RATE_LIMIT_PER_MINUTE: ${DASHBOARD_RATE_LIMIT_PER_MINUTE:-120}
      CLERK_JWKS_URL: ${CLERK_JWKS_URL}
      CLERK_JWT_ISSUER: ${CLERK_JWT_ISSUER}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY}
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}
      CLERK_PUBLISHABLE_KEY: ${CLERK_PUBLISHABLE_KEY}
      PLATFORM_OWNER_EMAILS: ${PLATFORM_OWNER_EMAILS}
      # Tenant BYOK
      SECRET_ENCRYPTION_KEY: ${SECRET_ENCRYPTION_KEY}
      ORGANIZATION_LLM_KEYS_ENABLED: ${ORGANIZATION_LLM_KEYS_ENABLED:-true}
      ORGANIZATION_LLM_PROVIDER_MODE: ${ORGANIZATION_LLM_PROVIDER_MODE:-platform_first}
      # Tenant integrations can be stored per tenant in SaaS mode; these are local fallback only.
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID}
      TELEGRAM_ENABLE_CALLBACKS: ${TELEGRAM_ENABLE_CALLBACKS:-true}
      WC_BASE_URL: ${WC_BASE_URL}
      WC_CONSUMER_KEY: ${WC_CONSUMER_KEY}
      WC_CONSUMER_SECRET: ${WC_CONSUMER_SECRET}
      # Platform/fallback LLM providers
      AZURE_OPENAI_API_KEY: ${AZURE_OPENAI_API_KEY}
      AZURE_OPENAI_ENDPOINT: ${AZURE_OPENAI_ENDPOINT}
      AZURE_OPENAI_DEPLOYMENT_NAME: ${AZURE_OPENAI_DEPLOYMENT_NAME}
      AZURE_OPENAI_DEPLOYMENT: ${AZURE_OPENAI_DEPLOYMENT}
      AZURE_OPENAI_API_VERSION: ${AZURE_OPENAI_API_VERSION}
      GROQ_API_KEY: ${GROQ_API_KEY}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL}
      OPENAI_MODEL: ${OPENAI_MODEL}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY}
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY}
      LANGFUSE_BASEURL: ${LANGFUSE_BASEURL}
      META_ACCESS_TOKEN: ${META_ACCESS_TOKEN}
      META_WEBHOOK_VERIFY_TOKEN: ${META_WEBHOOK_VERIFY_TOKEN}
      ENABLE_WEBHOOK_SERVER: ${ENABLE_WEBHOOK_SERVER:-true}
      WEBHOOK_PORT: ${WEBHOOK_PORT:-3100}
      DATA_DIR: /app/data
      TZ: ${TZ:-Africa/Nairobi}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    ports:
      - "${WEBHOOK_PORT:-3100}:3100"
    volumes:
      - stayez_data:/app/data
    restart: unless-stopped

volumes:
  stayez_data:
